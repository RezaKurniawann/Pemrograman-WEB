<!DOCTYPE html>
<html>
<head>
    <title>Form Pendaftaran Orang Tua</title>
    <link rel="stylesheet" href="../style/styleLoginRegis.css">
</head>
<body>
    <form action="../process/registerProcess.php" method="post">
        <div class="container-register">
            <header>Akun Login</header>
            <div class="box-register">
                <label for="username">Username</label>
                <input type="text" id="username" name="username" placeholder="Enter Username">
                <label for="password">Password</label>
                <input type="password" id="password" name="password" placeholder="Enter Password">
            </div>
        </div>
        <div class="container-register">
            <header>Informasi Orang Tua</header>
            <div class="box-register">
                <label for="nama">Nama Lengkap</label>
                <input type="text" id="nama" name="nama" placeholder="Masukkan Nama Lengkap Anda">
                
                <label for="jenis_kelamin">Jenis Kelamin</label>
                <select id="jenis_kelamin" name="jenis_kelamin">
                    <option value="laki-laki">Laki-laki</option>
                    <option value="perempuan">Perempuan</option>
                </select>
                
                <label for="umur">Umur</label>
                <input type="text" id="umur" name="umur" placeholder="Masukkan Umur Anda">
                
                <label for="nohp">No. HP</label>
                <input type="text" id="nohp" name="nohp" placeholder="Masukkan No. HP Anda">
                
                <label for="pendidikan">Pendidikan</label>
                <input type="text" id="pendidikan" name="pendidikan" placeholder="Masukkan Pendidikan Anda">
                
                <label for="pekerjaan">Pekerjaan</label>
                <input type="text" id="pekerjaan" name="pekerjaan" placeholder="Masukkan Pekerjaan Anda">
                
                <label for="penghasilan">Penghasilan</label>
                <input type="text" id="penghasilan" name="penghasilan" placeholder="Masukkan Penghasilan Anda">
                
                <label for="nim_mahasiswa">NIM Mahasiswa</label>
                <input type="text" id="nim_mahasiswa" name="nim_mahasiswa" placeholder="Masukkan NIM Mahasiswa Anda">
                
                <label for="nama_mahasiswa">Nama Lengkap Mahasiswa</label>
                <input type="text" id="nama_mahasiswa" name="nama_mahasiswa" placeholder="Masukkan Nama Lengkap Mahasiswa Anda">
                
                <label for="prodi">Prodi</label>
                <select id="prodi" name="prodi">
                    <option value="TI">D4 Teknik Informatika</option>
                    <option value="SIB">D4 Sistem Informasi Bisnis</option>
                    <option value = "FastTrack">D2 Fast Track</option>
                </select>
            </div>
            <div class="submit">
                <input type="submit" value="Register">
            </div>
            <div class="switch">
                <p>Sudah punya akun?
                    <a href="../login.php">Login</a>
                </p>
            </div>
        </div>
    </form>
</body>
</html>
