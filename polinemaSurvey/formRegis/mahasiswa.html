<!DOCTYPE html>
<html>
<head>
    <title>Login Form</title>
    <link rel="stylesheet" href="../style/styleLoginRegis.css">
</head>
<body>
    <form action="../process/registerProcess.php" method="post">
        <div class="container-register">
            <header>Akun Login</header>
            <div class="box-register">
                <label for="username">Username</label>
                <input type="text" id="username" name="username" placeholder="Enter Username">
                <label for="password">Password</label>
                <input type="password" id="password" name="password" placeholder="Enter Password">
            </div>
        </div>
        <div class="container-register">
            <header>Informasi Mahasiswa</header>
            <div class="box-register">
                
                <label for="nim">NIM</label>
                <input type="text" id="nim" name="nim" placeholder="Masukkan NIM Anda">
                
                <label for="nama">Nama Lengkap</label>
                <input type="text" id="nama" name="nama" placeholder="Masukkan Nama Lengkap Anda">
                
                <label for="prodi">Prodi</label>
                <select id="prodi" name="prodi">
                    <option value="TI">D4 Teknik Informatika</option>
                    <option value="SIB">D4 Sistem Informasi Bisnis</option>
                    <option value = "FastTrack">D2 Fast Track</option>
                </select>

                
                <label for="email">Email</label>
                <input type="email" id="email" name="email" placeholder="Masukkan Email Anda">
                
                <label for="nohp">No. HP</label>
                <input type="text" id="nohp" name="nohp" placeholder="Masukkan No. HP Anda">
                
                <label for="tahunmasuk">Tahun Masuk</label>
                <input type="text" id="tahunmasuk" name="tahunmasuk" placeholder="Masukkan Tahun Masuk Anda">
                           
            </div>
            <div class="submit">
                <input type="submit" value="Register">
            </div>
            <div class="switch">
                <p>sudah punya akun?
                    <a href="../login.php">Login</a>
                </p>
            </div>
        </div>
    </form>
</body>
</html>
