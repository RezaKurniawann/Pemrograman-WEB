<!DOCTYPE html>
<html>
<head>
    <title>Form Pendaftaran Alumni</title>
    <link rel="stylesheet" href="../style/styleLoginRegis.css">
</head>
<body>
    <form action="../process/registerProcess.php" method="post">
        <div class="container-register">
            <header>Akun Login</header>
            <div class="box-register">
                <label for="username">Username</label>
                <input type="text" id="username" name="username" placeholder="Masukkan Username">
                <label for="password">Password</label>
                <input type="password" id="password" name="password" placeholder="Masukkan Password">
            </div>
        </div>
        <div class="container-register">
            <header>Informasi Alumni</header>
            <div class="box-register">
                <label for="nim">NIM</label>
                <input type="text" id="nim" name="nim" placeholder="Masukkan NIM Anda">
                
                <label for="nama">Nama Lengkap</label>
                <input type="text" id="nama" name="nama" placeholder="Masukkan Nama Lengkap Anda">
                
                <label for="prodi">Program Studi</label>
                <input type="text" id="prodi" name="prodi" placeholder="Masukkan Program Studi Anda">
                
                <label for="email">Email</label>
                <input type="email" id="email" name="email" placeholder="Masukkan Email Anda">
                
                <label for="nohp">No. HP</label>
                <input type="text" id="nohp" name="nohp" placeholder="Masukkan No. HP Anda">
                
                <label for="tahunlulus">Tahun Lulus</label>
                <input type="text" id="tahunlulus" name="tahunlulus" placeholder="Masukkan Tahun Lulus Anda">
            </div>
            <div class="submit">
                <input type="submit" value="Register">
            </div>
            <div class="switch">
                <p>Sudah punya akun?
                    <a href="../login.php">Login</a>
                </p>
            </div>
        </div>
    </form>
</body>
</html>
