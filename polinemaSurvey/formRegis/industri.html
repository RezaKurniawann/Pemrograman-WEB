<!DOCTYPE html>
<html>
<head>
    <title>Form Pendaftaran Industri</title>
    <link rel="stylesheet" href="../style/styleLoginRegis.css">
</head>
<body>
    <form action="../process/registerProcess.php" method="post">
        <div class="container-register">
            <header>Akun Login</header>
            <div class="box-register">
                <label for="username">Username</label>
                <input type="text" id="username" name="username" placeholder="Enter Username">
                <label for="password">Password</label>
                <input type="password" id="password" name="password" placeholder="Enter Password">
            </div>
        </div>
        <div class="container-register">
            <header>Informasi Industri</header>
            <div class="box-register">
                <label for="nama">Nama Lengkap</label>
                <input type="text" id="nama" name="nama" placeholder="Masukkan Nama Lengkap Anda">
                
                <label for="jabatan">Jabatan</label>
                <input type="text" id="jabatan" name="jabatan" placeholder="Masukkan Jabatan Anda">
                
                <label for="perusahaan">Perusahaan</label>
                <input type="text" id="perusahaan" name="perusahaan" placeholder="Masukkan Nama Perusahaan Anda">
                
                <label for="email">Email</label>
                <input type="email" id="email" name="email" placeholder="Masukkan Email Anda">
                
                <label for="nohp">No. HP</label>
                <input type="text" id="nohp" name="nohp" placeholder="Masukkan No. HP Anda">
                
                <label for="kota">Kota</label>
                <input type="text" id="kota" name="kota" placeholder="Masukkan Kota Anda">
            </div>
            <div class="submit">
                <input type="submit" value="Register">
            </div>
            <div class="switch">
                <p>Sudah punya akun?
                    <a href="../login.php">Login</a>
                </p>
            </div>
        </div>
    </form>
</body>
</html>
